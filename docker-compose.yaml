version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: neomarket_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neomarket_b2c
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: neomarket_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/neomarket_b2c
      JWT_SECRET: htrhrthrthrtgfdgdfgrethjrtj
    volumes:
      - .:/app

volumes:
  postgres_data:
